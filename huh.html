<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miss Rose Com PK Official Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <style>
    .product_card {
      border: 1px solid #ddd;
      border-radius: 1px;
      cursor: pointer;
      height: 380px;
      width: 283px;
      overflow: hidden;
      position: relative;
    }

    .product_img {
      position: relative;
      width: 100%;
      height: 280px;
      overflow: hidden;
    }

    .product_img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* default image (simple) */
    .product_img img:first-child {
      z-index: 1;
    }

    /* hover image (hidden by default) */
    .product_img img:last-child {
      z-index: 2;
      opacity: 0;
      transform: scale(1.2); /* thoda bada start kare */
      transition: all 0.2s ease-in-out;
    }

    /* hover effect → dusri image suddenly visible + zoom-in */
    .product_card:hover .product_img img:last-child {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>

<body>

  <div class="product_card">
    <div class="product_img">
      <!-- default image -->
      <img src="https://missrose.com.pk/cdn/shop/files/Miss_Rose_Silk_Flawless_Foundation.png?v=1747914943&width=533"
        alt="Miss_Rose_Silk_Flawless_Foundation">

      <!-- hover image (suddenly appear + zoom-in) -->
      <img
        src="https://missrose.com.pk/cdn/shop/files/Miss_Rose_Com_Pk_-_Silk_Flawless_Foundation_shade_card.png?v=1748278180"
        alt="Miss_Rose_Silk_Flawless_Foundation_Hover">
    </div>

    <div class="product_info">
      <p>Miss Rose Silk Flawless Foundation</p>
      <p><i class="bi bi-star-fill"></i>
        <i class="bi bi-star-fill"></i>
        <i class="bi bi-star-fill"></i>
        <i class="bi bi-star-fill"></i>
        <i class="bi bi-star-fill"></i> (596)
      </p>
      <p class="old-price">Rs.999 PKR</p>
      <p class="new-price">Rs.599 PKR</p>
      <div class="sale">sale</div>
    </div>
  </div>

</body>
</html>
